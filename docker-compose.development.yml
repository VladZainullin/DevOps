name: "main"

services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    ports:
      - "8080:8080"
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: 123456
      KC_DB_SCHEMA: keycloak
      KC_DB_URL_DATABASE: keycloak
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
    depends_on:
      - postgres
    networks:
      - postgres-keycloak-bridge
    restart: no
  
  postgres:
    image: postgres:latest
    container_name: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/01-create-roles.sql:/docker-entrypoint-initdb.d/01-create-roles.sql
      - ./postgres/02-create-databases.sql:/docker-entrypoint-initdb.d/02-create-databases.sql
      - ./postgres/03-create-schemas.sql:/docker-entrypoint-initdb.d/03-create-schemas.sql
    ports:
      - "5432:5432"
    networks:
      - postgres-keycloak-bridge
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    restart: no
      
  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: Secure123$
    restart: no
    
  rabbitmq:
    image: rabbitmq:4.2.2-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=123456
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
  
  mimir:
    image: grafana/mimir:latest
    container_name: mimir
    ports:
      - "9009:9009"   # HTTP API
      - "9095"        # gRPC (будет конфликтовать с Tempo, используем другой порт)
    command: -config.file=/etc/mimir/config.yaml
    volumes:
      - ./mimir/mimir.yaml:/etc/mimir/config.yaml:ro
      - mimir_data:/data
    restart: no

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    ports:
      - "3200:3200"   # HTTP
      - "9095:9095"   # gRPC
    command: -config.file=/etc/tempo/config.yaml
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/tmp/tempo
    restart: no

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    restart: unless-stopped
  
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "12345:12345" # Alloy UI
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy /etc/alloy/config.alloy
    restart: no
    depends_on:
      - loki
      - tempo
      - mimir

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana_data:/var/lib/grafana
    restart: no
    depends_on:
      - loki
      - tempo
      - mimir
      
networks:
  postgres-keycloak-bridge:
    driver: bridge
    name: postgres-keycloak-bridge
  observability:
    driver: bridge
    name: observability

volumes:
  postgres_data:
  minio_data:
  keycloak_data:
  rabbitmq_data:
  rabbitmq_logs:
  loki_data:
  tempo_data:
  mimir_data:
  grafana_data:
  alloy_data: