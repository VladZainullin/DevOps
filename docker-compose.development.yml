name: "main"

services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    ports:
      - "8080:8080"
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: 123456
      KC_DB_SCHEMA: keycloak
      KC_DB_URL_DATABASE: keycloak
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
    depends_on:
      - postgres
    networks:
      - postgres-keycloak-bridge
    restart: no
  
  postgres:
    image: postgres:latest
    container_name: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/01-create-roles.sql:/docker-entrypoint-initdb.d/01-create-roles.sql
      - ./postgres/02-create-databases.sql:/docker-entrypoint-initdb.d/02-create-databases.sql
      - ./postgres/03-create-schemas.sql:/docker-entrypoint-initdb.d/03-create-schemas.sql
    ports:
      - "5432:5432"
    networks:
      - postgres-keycloak-bridge
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    restart: no
      
  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: Secure123$
    restart: no
    
  rabbitmq:
    image: rabbitmq:4.2.2-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=123456
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
  
  mimir:
    image: grafana/mimir:latest
    container_name: mimir
    command: [ "-config.file=/etc/mimir/mimir.yaml" ]
    volumes:
      - ./mimir/mimir.yaml:/etc/mimir/mimir.yaml
    ports:
      - "9009:9009"   # UI Mimir / API запросов Grafana
    networks:
      - observability
    restart: no

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: [ "-config.file=/etc/tempo/tempo.yaml" ]
    ports:
        - "3200:3200"   # UI Tempo
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml
    networks:
      - observability
    restart: no

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./loki/loki.yaml:/etc/loki/loki.yaml
    ports:
      - "3100:3100"   # UI Loki
    networks:
      - observability
    restart: no
  
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    volumes:
      - ./alloy/config.river:/etc/alloy/config.river
    ports:
      - "4317:4317"
      - "4318:4318"
      - "12345:12345"
    command: run /etc/alloy/config.river
    networks:
      - observability
    depends_on:
      - mimir
      - loki
      - tempo
    restart: no

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    networks:
      - observability
    depends_on:
      - loki
      - tempo
      - mimir
    restart: no
      
networks:
  postgres-keycloak-bridge:
    driver: bridge
    name: postgres-keycloak-bridge
  observability:
    driver: bridge
    name: observability

volumes:
  postgres_data:
  minio_data:
  keycloak_data:
  rabbitmq_data:
  rabbitmq_logs:
  grafana_data: